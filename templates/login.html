<!DOCTYPE html>
<html lang="nl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen — Menu Maker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/design.css">
  <script>
    (function(){
      var t = localStorage.getItem('menu-maker-theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

<!-- Theme toggle -->
<button class="theme-toggle" id="themeToggle" aria-label="Wissel thema">
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<div class="fullscreen-page">
  <div class="fullscreen-container" style="text-align:center">

    <div style="margin-bottom:40px">
      <h1 style="font-size:2.25rem;margin-bottom:4px">Menu Maker</h1>
      <p class="text-secondary" style="font-size:.95rem">Menukaart Intelligentie</p>
    </div>

    <div class="card" style="text-align:left">
      <h2 style="margin-bottom:24px;font-size:1.25rem">Inloggen</h2>

      {% if error %}
      <div class="error-box">{{ error }}</div>
      {% endif %}

      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label class="form-label" for="email">E-mailadres</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="jouw@email.nl" value="{{ email or '' }}" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="wachtwoord">Wachtwoord</label>
          <input class="form-input" type="password" id="wachtwoord" name="wachtwoord" placeholder="Voer je wachtwoord in" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px">Inloggen</button>
      </form>
    </div>

    <p style="margin-top:24px;font-size:.9rem;color:var(--color-text-secondary)">
      Nog geen account? <a href="{{ url_for('onboarding.register') }}" class="text-gold" style="font-weight:600">Registreer je restaurant</a>
    </p>

  </div>
</div>

<script>
(function() {
  var btn = document.getElementById('themeToggle');
  var moon = btn ? btn.querySelector('.icon-moon') : null;
  var sun = btn ? btn.querySelector('.icon-sun') : null;
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('menu-maker-theme', t);
    if (moon && sun) {
      moon.style.display = t === 'light' ? 'none' : 'block';
      sun.style.display = t === 'light' ? 'block' : 'none';
    }
  }
  applyTheme(localStorage.getItem('menu-maker-theme') || 'dark');
  if (btn) btn.addEventListener('click', function() {
    applyTheme(document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
  });
})();
</script>
</body>
</html>
