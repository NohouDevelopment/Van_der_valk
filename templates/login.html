<!DOCTYPE html>
<html lang="nl" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen — Menu Maker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/theme.css">
  <script>(function(){var t=localStorage.getItem("menu-maker-theme")||(window.matchMedia("(prefers-color-scheme: light)").matches?"light":"dark");document.documentElement.setAttribute("data-theme",t);})();</script>
  <style>
    :root {
      --gold: #C9A84C; --gold-light: #E8C96A; --gold-dim: rgba(201,168,76,.15);
      --dark: #0F0F0F; --dark-2: #1A1A1A; --dark-3: #242424;
      --text: #E8E4DC; --text-dim: #9A9590; --border: rgba(201,168,76,.2);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    nav { position: sticky; top: 0; z-index: 100; background: rgba(15,15,15,.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 900px; margin: 0 auto; padding: 0 2rem; height: 64px; display: flex; align-items: center; }
    .nav-brand { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 600; color: var(--gold); letter-spacing: .05em; }
    .nav-brand span { color: var(--text-dim); font-weight: 300; font-size: .85rem; margin-left: .5rem; }
    .main { flex: 1; max-width: 420px; margin: 0 auto; padding: 5rem 2rem; width: 100%; }
    .page-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; margin-bottom: .5rem; }
    .page-title em { font-style: normal; color: var(--gold); }
    .page-sub { color: var(--text-dim); font-size: .9rem; margin-bottom: 2.5rem; }
    .error-box { background: rgba(229,57,53,.12); border: 1px solid rgba(229,57,53,.35); border-radius: 10px; padding: .9rem 1.1rem; color: #EF9A9A; font-size: .85rem; margin-bottom: 1.5rem; display: flex; gap: .5rem; }
    .error-box::before { content: "\26A0"; flex-shrink: 0; }
    form { display: flex; flex-direction: column; gap: 1.25rem; }
    .field { display: flex; flex-direction: column; gap: .4rem; }
    label { font-size: .75rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text-dim); }
    input[type="text"], input[type="email"], input[type="password"] {
      background: var(--dark-2); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: .95rem;
      padding: .85rem 1rem; transition: border-color .2s; outline: none; width: 100%;
    }
    input:focus { border-color: var(--gold); }
    input::placeholder { color: var(--text-dim); opacity: .6; }
    .btn { background: var(--gold); color: #0F0F0F; font-family: 'Inter', sans-serif; font-size: .95rem; font-weight: 600; border: none; border-radius: 10px; padding: .95rem 2rem; cursor: pointer; width: 100%; transition: background .2s, transform .1s; letter-spacing: .03em; }
    .btn:hover { background: var(--gold-light); }
    .btn:active { transform: scale(.98); }
    .link-row { text-align: center; margin-top: .75rem; font-size: .85rem; color: var(--text-dim); }
    .link-row a { color: var(--gold); text-decoration: none; }
    .link-row a:hover { text-decoration: underline; }
    footer { border-top: 1px solid var(--border); padding: 1.5rem 2rem; text-align: center; }
    footer p { color: var(--text-dim); font-size: .78rem; }
  </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="nav-brand">MENU MAKER <span>voor restaurants</span></div>
  </div>
</nav>

<div class="main">
  <h1 class="page-title">Welkom <em>terug</em></h1>
  <p class="page-sub">Log in met je account om je menu-analyses te bekijken en te beheren.</p>

  {% if error %}
  <div class="error-box">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="field">
      <label for="email">E-mailadres</label>
      <input type="email" id="email" name="email" placeholder="jouw@email.nl" value="{{ email or '' }}" required autocomplete="email">
    </div>
    <div class="field">
      <label for="wachtwoord">Wachtwoord</label>
      <input type="password" id="wachtwoord" name="wachtwoord" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn">Inloggen</button>
  </form>

  <div class="link-row">
    Nog geen account? <a href="{{ url_for('onboarding.register') }}">Registreer je restaurant</a>
  </div>
</div>

<footer><p>Menu Maker · Aangedreven door Gemini AI</p></footer>
<button class="theme-toggle" onclick="toggleTheme()" title="Licht/Donker modus">
  <span class="theme-icon-moon">&#127769;</span>
  <span class="theme-icon-sun">&#9728;</span>
</button>
<script src="/static/theme.js"></script>
</body>
</html>
