<!DOCTYPE html>
<html lang="nl" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Pagina niet gevonden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/theme.css">
  <script>(function(){var t=localStorage.getItem("menu-maker-theme")||(window.matchMedia("(prefers-color-scheme: light)").matches?"light":"dark");document.documentElement.setAttribute("data-theme",t);})();</script>
  <style>
    :root {
      --gold: #C9A84C; --gold-light: #E8C96A; --gold-dim: rgba(201,168,76,.15);
      --dark: #0F0F0F; --dark-2: #1A1A1A;
      --text: #E8E4DC; --text-dim: #9A9590; --border: rgba(201,168,76,.2);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    nav { position: sticky; top: 0; z-index: 100; background: rgba(15,15,15,.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 900px; margin: 0 auto; padding: 0 2rem; height: 64px; display: flex; align-items: center; }
    .nav-brand { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 600; color: var(--gold); letter-spacing: .05em; }
    .main { flex: 1; max-width: 520px; margin: 0 auto; padding: 5rem 2rem; width: 100%; text-align: center; }
    .error-code { font-family: 'Playfair Display', serif; font-size: 5rem; font-weight: 700; color: var(--gold); line-height: 1; margin-bottom: .5rem; }
    .error-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 600; margin-bottom: .75rem; }
    .error-msg { color: var(--text-dim); font-size: .95rem; line-height: 1.6; margin-bottom: 2rem; }
    .btn-back { display: inline-block; background: var(--gold); color: #0F0F0F; font-family: 'Inter', sans-serif; font-size: .9rem; font-weight: 600; border: none; border-radius: 10px; padding: .85rem 2rem; text-decoration: none; transition: background .2s; }
    .btn-back:hover { background: var(--gold-light); }
    footer { border-top: 1px solid var(--border); padding: 1.5rem 2rem; text-align: center; }
    footer p { color: var(--text-dim); font-size: .78rem; }
  </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="nav-brand">MENU MAKER</div>
  </div>
</nav>
<div class="main">
  <div class="error-code">404</div>
  <h1 class="error-title">Pagina niet gevonden</h1>
  <p class="error-msg">De pagina die je zoekt bestaat niet of is verplaatst.</p>
  <a href="/" class="btn-back">Terug naar dashboard</a>
</div>
<footer><p>Menu Maker &middot; Aangedreven door Gemini AI</p></footer>
<button class="theme-toggle" onclick="toggleTheme()" title="Licht/Donker modus">
  <span class="theme-icon-moon">&#127769;</span>
  <span class="theme-icon-sun">&#9728;</span>
</button>
<script src="/static/theme.js"></script>
</body>
</html>
